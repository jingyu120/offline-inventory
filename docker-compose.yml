services:
  postgres:
    image: postgres:15-alpine
    container_name: burma_inventory_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: burma_inventory_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: burma_inventory_pgbouncer
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=inventory_db
      - LISTEN_PORT=6432
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=50
    ports:
      - '6432:6432'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
